name: Build toolbox image

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: rhel9-dev-toolbox

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # The image contains five JDKs and two IDEs; reclaim runner disk first.
      - name: Free up runner disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Build image
        run: podman build -t "${IMAGE_NAME}" -f Containerfile .

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | podman login ghcr.io -u "${{ github.actor }}" --password-stdin
          registry_image="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}"
          podman tag "${IMAGE_NAME}" "${registry_image}:latest"
          podman tag "${IMAGE_NAME}" "${registry_image}:$(date +%Y%m%d)-${GITHUB_SHA::7}"
          podman push "${registry_image}:latest"
          podman push "${registry_image}:$(date +%Y%m%d)-${GITHUB_SHA::7}"
